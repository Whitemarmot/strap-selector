<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strap Selector</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <section class="strap-selector">
    <h2 class="strap-selector__title">Choose your strap</h2>

    <div class="carousel">
      <button class="carousel__arrow carousel__arrow--prev" aria-label="Previous">&lsaquo;</button>

      <div class="carousel__viewport">
        <div class="carousel__track">
          <!-- Slides generated by JS -->
        </div>
      </div>

      <button class="carousel__arrow carousel__arrow--next" aria-label="Next">&rsaquo;</button>
    </div>

    <p class="strap-selector__name"></p>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
